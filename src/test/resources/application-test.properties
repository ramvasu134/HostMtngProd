# ===== Test Profile ? in-memory H2 for fast isolated tests =====
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false
spring.thymeleaf.cache=false

# Flyway disabled for tests (use Hibernate create-drop)
spring.flyway.enabled=false

# Seeding disabled for tests - create test data explicitly
app.seed.enabled=false
app.seed.log-credentials=false

# Test JWT secret
app.jwt.secret=TEST_SECRET_KEY_FOR_UNIT_TESTS_ONLY

# WebSocket - allow all for tests
app.websocket.allowed-origins=*

logging.level.com.host.studen=WARN
logging.level.org.springframework.security=WARN
