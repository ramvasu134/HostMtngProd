<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetings - Host Mtng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/host-dashboard.css}" rel="stylesheet">
</head>
<body class="theme-dark">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo"><i class="fas fa-feather-alt"></i></div>
            <span class="brand-text">AiR<span class="brand-highlight">Voices</span></span>
        </div>
        <ul class="sidebar-nav">
            <li class="nav-item"><a th:href="@{/host/dashboard}"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
            <li class="nav-item active"><a th:href="@{/host/meetings}"><i class="fas fa-microphone-alt"></i><span>Meetings</span></a></li>
            <li class="nav-item"><a th:href="@{/host/students}"><i class="fas fa-user-graduate"></i><span>Students</span></a></li>
            <li class="nav-item"><a th:href="@{/host/recordings}"><i class="fas fa-record-vinyl"></i><span>Recordings</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><span th:text="${#strings.substring(user.displayName, 0, 2).toUpperCase()}">TH</span></div>
                <div class="user-details">
                    <span class="user-name" th:text="${user.displayName}">Teacher</span>
                    <span class="user-role">TEACHER</span>
                </div>
            </div>
            <div class="sidebar-actions">
                <button class="btn-settings" onclick="toggleSettingsDropdown(event)" title="Settings"><i class="fas fa-cog"></i></button>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                </form>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="header-title">
                <h2><i class="fas fa-microphone-alt me-3"></i>My Meetings</h2>
                <p class="subtitle">Manage your audio meetings and sessions</p>
            </div>
            <div class="header-actions">
                <a th:href="@{/host/meetings/create}" class="btn btn-primary-gradient"><i class="fas fa-plus me-2"></i>New Meeting</a>
            </div>
        </header>

        <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

        <div class="card-panel">
            <div class="panel-header">
                <h3><i class="fas fa-list me-2"></i>All Meetings</h3>
            </div>
            <div class="meetings-list">
                <div th:if="${meetings != null and !meetings.isEmpty()}">
                    <div th:each="meeting : ${meetings}" class="meeting-row">
                        <div class="meeting-row-icon"><i class="fas fa-microphone-alt"></i></div>
                        <div class="meeting-row-info">
                            <h4 th:text="${meeting.title}">Meeting Title</h4>
                            <span th:text="${meeting.meetingCode}">CODE</span>
                        </div>
                        <div class="meeting-row-actions">
                            <a th:if="${meeting.status.name() == 'LIVE'}" th:href="@{/meeting/room/{code}(code=${meeting.meetingCode})}" class="btn btn-success">Join</a>
                            <form th:if="${meeting.status.name() == 'SCHEDULED'}" th:action="@{/host/meetings/{id}/start(id=${meeting.id})}" method="post" style="display:inline">
                                <button type="submit" class="btn btn-primary">Start</button>
                            </form>
                        </div>
                    </div>
                </div>
                <p th:if="${meetings == null or meetings.isEmpty()}" class="text-center text-muted p-4">No meetings created yet.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/host-dashboard.js}"></script>
</body>
</html>
