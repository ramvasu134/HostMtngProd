<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Host Mtng</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05));
            animation: float 20s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            animation-delay: 5s;
        }

        .bg-circle:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(30px, 10px) scale(1.02); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(99, 102, 241, 0.4);
            border-radius: 50%;
            animation: particle-float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 60%; top: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 80%; top: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 40%; top: 50%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 90%; top: 10%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 15%; top: 60%; animation-delay: 6s; }
        .particle:nth-child(8) { left: 70%; top: 90%; animation-delay: 7s; }

        @keyframes particle-float {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.4; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 0.8; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(99, 102, 241, 0.15);
        }

        /* Brand Logo */
        .brand-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #FFB84D, #D4AF37);
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow:
                0 12px 40px rgba(255, 184, 77, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .brand-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.15),
                transparent
            );
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .brand-icon i {
            font-size: 40px;
            color: white;
            position: relative;
            z-index: 1;
        }

        .brand-title {
            font-size: 36px;
            font-weight: 800;
            color: #f0f6fc;
            letter-spacing: -0.5px;
        }

        .brand-title span {
            background: linear-gradient(135deg, #FFD580, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            color: #D4C5B0;
            font-size: 15px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Form */
        .login-form {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #6e7681;
            font-size: 18px;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 18px 50px 18px 52px;
            background: rgba(13, 17, 23, 0.8);
            border: 2px solid rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            color: #f0f6fc;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(13, 17, 23, 1);
        }

        .form-input:focus ~ .input-icon {
            color: #818cf8;
        }

        .form-input::placeholder {
            color: #6e7681;
        }

        /* Password visibility toggle */
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8B6F47;
            cursor: pointer;
            padding: 6px;
            transition: color 0.3s ease;
            font-size: 16px;
        }

        .password-toggle:hover {
            color: #D4C5B0;
        }

        /* Alert */
        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        /* Submit Button */
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(99, 102, 241, 0.5);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(99, 102, 241, 0.1);
        }

        .login-footer p {
            font-size: 14px;
            color: #6e7681;
        }

        .login-footer a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #c084fc;
        }

        .terms-inline {
            margin-top: 12px;
            text-align: center;
        }

        .terms-inline a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(129, 140, 248, 0.35);
            background: rgba(99, 102, 241, 0.12);
            color: #c7d2fe;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
        }

        /* Info text */
        .login-info {
            text-align: center;
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 184, 77, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 184, 77, 0.15);
        }

        .login-info p {
            font-size: 13px;
            color: #D4C5B0;
            line-height: 1.5;
        }

        .login-info i {
            color: #FFB84D;
            margin-right: 6px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .brand-icon {
                width: 76px;
                height: 76px;
            }

            .brand-title {
                font-size: 30px;
            }
        }
    </style>
    <script src="/js/capacitor-bridge.js" defer></script>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Brand Logo -->
            <div class="brand-logo">
                <div class="brand-icon">
                    <i class="fas fa-video"></i>
                </div>
                <h1 class="brand-title">Host<span>Mtng</span></h1>
                <p class="brand-subtitle">ðŸŽ“ Teaching Redefined ðŸŽ“</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                <span>Invalid username or password</span>
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span>You have been logged out successfully</span>
            </div>
            <div th:if="${message}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}">Success</span>
            </div>

            <!-- Single Login Form (Username + Password only) -->
            <form class="login-form" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" name="username"
                               placeholder="Enter your username" required autocomplete="username">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" name="password"
                               placeholder="Enter your password" required autocomplete="current-password">
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="passwordToggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>

                <div class="terms-inline">
                    <a th:href="@{/terms-and-conditions}">
                        <i class="fas fa-file-contract"></i> View Terms & Conditions
                    </a>
                </div>

                <div class="login-info">
                    <p><i class="fas fa-info-circle"></i>Teachers and Students use the same login</p>
                </div>
            </form>

            <div class="login-footer">
                <p>New teacher? <a th:href="@{/register}">Create an account</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordToggleIcon');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script>
        // Auto-dismiss all alert messages after 3 seconds
        document.addEventListener('DOMContentLoaded', function () {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function (alert) {
                setTimeout(function () {
                    alert.style.transition = 'opacity 0.6s ease, transform 0.6s ease, max-height 0.6s ease, margin 0.6s ease, padding 0.6s ease';
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-8px)';
                    alert.style.maxHeight = '0';
                    alert.style.marginBottom = '0';
                    alert.style.padding = '0';
                    alert.style.overflow = 'hidden';
                    setTimeout(function () { alert.remove(); }, 650);
                }, 3000);
            });
        });
    </script>
</body>
</html>
