<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetings - Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
            <span class="brand-text">Meeting Hub</span>
        </div>
        <ul class="sidebar-nav">
            <li class="nav-item"><a th:href="@{/student/dashboard}"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
            <li class="nav-item active"><a th:href="@{/student/meetings}"><i class="fas fa-video"></i><span>Meetings</span></a></li>
            <li class="nav-item"><a th:href="@{/student/recordings}"><i class="fas fa-circle-play"></i><span>Recordings</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar student"><i class="fas fa-user-graduate"></i></div>
                <div class="user-details"><span class="user-name" th:text="${user.displayName}">Student</span><span class="user-role student-role">STUDENT</span></div>
            </div>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"><i class="fas fa-bars"></i></button>
            <h2>Meetings</h2>
            <div class="header-actions">
                <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#joinModal">
                    <i class="fas fa-door-open me-2"></i>Join Meeting
                </button>
            </div>
        </header>

        <div th:if="${error}" class="alert alert-danger" style="background:rgba(239,68,68,.15);color:#fca5a5;border:none;border-radius:12px;">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        </div>

        <!-- Live Now -->
        <div class="card-panel mb-4" th:if="${#lists.size(liveMeetings) > 0}">
            <div class="panel-header"><h3><i class="fas fa-broadcast-tower me-2 text-success"></i>Live Now</h3></div>
            <div class="live-meetings-grid">
                <div th:each="m : ${liveMeetings}" class="live-meeting-card">
                    <div class="live-indicator"><span class="pulse"></span> LIVE</div>
                    <h4 th:text="${m.title}">Meeting</h4>
                    <p>Host: <strong th:text="${m.host.displayName}">Host</strong></p>
                    <form th:action="@{/student/meetings/join}" method="post">
                        <input type="hidden" name="meetingCode" th:value="${m.meetingCode}">
                        <button type="submit" class="btn btn-sm btn-success w-100"><i class="fas fa-door-open me-1"></i>Join</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Past Meetings -->
        <div class="card-panel">
            <div class="panel-header"><h3><i class="fas fa-history me-2"></i>Meeting History</h3></div>
            <div class="meeting-list">
                <div th:each="m : ${participatedMeetings}" class="meeting-item">
                    <div class="meeting-info">
                        <span class="meeting-title" th:text="${m.title}">Meeting</span>
                        <span class="meeting-code">Host: <strong th:text="${m.host.displayName}">Host</strong></span>
                    </div>
                    <span class="badge" th:classappend="${m.status.name() == 'LIVE'} ? 'bg-success' : 'bg-secondary'" th:text="${m.status}">STATUS</span>
                </div>
                <p th:if="${#lists.size(participatedMeetings) == 0}" class="empty-state">You haven't joined any meetings yet.</p>
            </div>
        </div>
    </main>

    <!-- Join Modal -->
    <div class="modal fade" id="joinModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background:#1e293b;border:1px solid rgba(99,102,241,.2);border-radius:16px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-white"><i class="fas fa-door-open me-2"></i>Join Meeting</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/student/meetings/join}" method="post">
                    <div class="modal-body">
                        <label class="form-label text-light">Meeting Code</label>
                        <input type="text" class="form-control" name="meetingCode" required placeholder="Enter meeting code"
                               style="background:rgba(15,23,42,.6);border:1px solid rgba(99,102,241,.15);color:white;border-radius:10px;padding:12px;">
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success"><i class="fas fa-door-open me-1"></i>Join</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
