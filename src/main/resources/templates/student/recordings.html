<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordings - Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <style>
        .recording-card { background: rgba(15,23,42,.4); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; }
        .recording-card h5 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
        .recording-meta { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
        .recordings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    </style>
    <script src="/js/capacitor-bridge.js" defer></script>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="brand-icon"><i class="fas fa-graduation-cap"></i></div><span class="brand-text">Meeting Hub</span></div>
        <ul class="sidebar-nav">
            <li class="nav-item"><a th:href="@{/student/dashboard}"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a th:href="@{/student/meetings}"><i class="fas fa-video"></i><span>Meetings</span></a></li>
            <li class="nav-item active"><a th:href="@{/student/recordings}"><i class="fas fa-circle-play"></i><span>Recordings</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info"><div class="user-avatar student"><i class="fas fa-user-graduate"></i></div>
            <div class="user-details"><span class="user-name" th:text="${user.displayName}">Student</span><span class="user-role student-role">STUDENT</span></div></div>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"><i class="fas fa-bars"></i></button>
            <h2><i class="fas fa-circle-play me-2"></i>Recordings</h2>
        </header>

        <div class="card-panel">
            <div class="recordings-grid">
                <div th:each="rec : ${recordings}" class="recording-card">
                    <h5><i class="fas fa-file-video me-2 text-info"></i><span th:text="${rec.fileName}">Recording</span></h5>
                    <div class="recording-meta">
                        <div><i class="fas fa-calendar me-1"></i><span th:text="${#temporals.format(rec.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span></div>
                        <div><i class="fas fa-chalkboard-teacher me-1"></i>Meeting: <span th:text="${rec.meeting.title}">Meeting</span></div>
                    </div>
                    <div class="d-flex gap-2 align-items-center">
                        <button class="btn btn-sm btn-primary" th:onclick="'toggleInlinePlay(\'stu-audio-' + ${rec.id} + '\', this)'"><i class="fas fa-play me-1"></i>Play</button>
                        <a th:href="@{/api/meeting/recording/{id}/download(id=${rec.id})}" class="btn btn-sm btn-outline-light"><i class="fas fa-download me-1"></i>Download</a>
                        <audio th:id="'stu-audio-' + ${rec.id}" th:src="@{/api/meeting/recording/{id}/play(id=${rec.id})}" preload="none" style="display:none;"
                               th:onended="'resetInlinePlay(\'stu-audio-' + ${rec.id} + '\')'"></audio>
                    </div>
                </div>
            </div>
            <p th:if="${#lists.size(recordings) == 0}" class="empty-state">No recordings available yet.</p>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleInlinePlay(audioId, btn) {
            const audio = document.getElementById(audioId);
            if (!audio) return;
            document.querySelectorAll('audio[id^="stu-audio-"]').forEach(a => { if (a.id !== audioId && !a.paused) { a.pause(); a.currentTime = 0; } });
            document.querySelectorAll('button').forEach(b => { if (b.onclick && b !== btn) { const i = b.querySelector('i.fa-pause'); if (i) i.className = 'fas fa-play me-1'; }});
            if (audio.paused) { audio.play(); const i = btn.querySelector('i'); if (i) i.className = 'fas fa-pause me-1'; }
            else { audio.pause(); const i = btn.querySelector('i'); if (i) i.className = 'fas fa-play me-1'; }
        }
        function resetInlinePlay(audioId) {
            const audio = document.getElementById(audioId);
            if (audio) audio.currentTime = 0;
            const container = audio ? audio.closest('.d-flex') : null;
            if (container) { const btn = container.querySelector('button'); if (btn) { const i = btn.querySelector('i'); if (i) i.className = 'fas fa-play me-1'; } }
        }
    </script>
</body>
</html>
