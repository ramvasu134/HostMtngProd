<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Host Student Meeting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .register-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            width: 100%; max-width: 500px; margin: 20px;
        }
        .register-card h2 { color: white; text-align: center; margin-bottom: 8px; }
        .register-card .subtitle { color: #94a3b8; text-align: center; margin-bottom: 24px; font-size: 14px; }
        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 10px; color: white; padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            color: white;
        }
        .form-label { color: #94a3b8; font-size: 14px; }
        .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 10px; color: white; padding: 12px 16px;
        }
        .form-select:focus {
            background: rgba(15, 23, 42, 0.8); border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); color: white;
        }
        .form-select option { background: #1e293b; color: white; }
        .btn-register {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none; border-radius: 12px; color: white;
            font-size: 16px; font-weight: 600;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
            color: white;
        }
        .login-link { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
        .login-link a { color: #818cf8; text-decoration: none; font-weight: 600; }
        .alert { border-radius: 10px; border: none; font-size: 14px; }
        .alert-danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2><i class="fas fa-user-plus me-2"></i>Create Account</h2>
        <p class="subtitle">Join the Host Student Meeting platform</p>

        <div th:if="${error}" class="alert alert-danger mb-3">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Teacher Name *</label>
                    <input type="text" class="form-control" th:field="*{teacherName}" required placeholder="e.g., VK2">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Display Name *</label>
                    <input type="text" class="form-control" th:field="*{displayName}" required placeholder="Your name">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username *</label>
                    <input type="text" class="form-control" th:field="*{username}" required placeholder="Choose username">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password *</label>
                    <input type="password" class="form-control" th:field="*{password}" required placeholder="Choose password">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select" th:field="*{role}">
                        <option value="STUDENT">Student</option>
                        <option value="HOST">Host / Teacher</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="optional">
                </div>
            </div>
            <button type="submit" class="btn btn-register mt-2">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
