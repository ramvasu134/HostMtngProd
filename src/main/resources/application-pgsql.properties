# ===== PostgreSQL Profile =====
# Supports environment variable overrides for cloud deployment
#
# In cloud, set these environment variables:
#   DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
#
# Works with: AWS RDS, Azure Database for PostgreSQL, Render, Railway,
#             Heroku Postgres, Supabase, Neon, DigitalOcean, Google Cloud SQL

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/host_student_meeting}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driverClassName=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Connection pool tuning for cloud
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Disable H2 console in PostgreSQL mode
spring.h2.console.enabled=false

