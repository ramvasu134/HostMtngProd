# ===== Production Cloud Profile (Render.com / ECS / AKS) =====
# Active when: SPRING_PROFILES_ACTIVE=prod
#
# Required env vars for database:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#
# Required env vars for security (MANDATORY - no defaults):
#   JWT_SECRET (generate with: openssl rand -hex 64)
#
# Optional env vars:
#   SEED_ENABLED=false (default), DB_POOL_SIZE, JWT_EXPIRATION

# ?? DataSource ????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
# IMPORTANT: Use 'validate' in production - schema changes via Flyway only!
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ?? Flyway Database Migrations ????????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ?? Connection Pool (tuned for production) ????????????????????????????????????
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.leak-detection-threshold=60000

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ?? Security ??????????????????????????????????????????????????????????????????
spring.h2.console.enabled=false
# MANDATORY: Override with strong secret in environment
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ?? Data Seeding (DISABLED in production) ?????????????????????????????????????
app.seed.enabled=${SEED_ENABLED:false}
app.seed.log-credentials=false

# ?? Actuator / Observability ??????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.db.enabled=true

# ?? Thymeleaf (cache ON in production) ????????????????????????????????????????
spring.thymeleaf.cache=true

# ?? File upload limits ????????????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.host.studen=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
# Log to stdout only (no file) ? container runtime captures stdout
logging.file.name=
logging.pattern.console=%d{ISO8601} %-5level [%thread] %logger{36} - %msg%n
