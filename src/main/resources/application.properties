# Application
spring.application.name=Host-Student-Meeting
server.port=8080

# ===== ACTIVE PROFILE =====
# "dev"   ? H2 in PostgreSQL-compat mode (runs instantly, zero install)
# "pgsql" ? connects to external PostgreSQL (docker / local install)
# "prod"  ? production PostgreSQL with env-var config (cloud)
spring.profiles.active=dev

# ===== JPA / Hibernate =====
# IMPORTANT: Use Flyway for migrations in production (ddl-auto=validate)
# For dev, use update; for prod profile, this is overridden to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== FLYWAY DATABASE MIGRATIONS =====
# Disabled by default for dev; enabled in prod profile
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== FILE UPLOAD / RECORDING STORAGE =====
# Overridden by APP_UPLOAD_DIR / APP_RECORDING_DIR env vars in production
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.recording.dir=${APP_RECORDING_DIR:./recordings}
app.profile-photos.dir=${APP_PROFILE_PHOTOS_DIR:./profile-photos}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ===== RECORDING CLEANUP (Automatic deletion of old recordings) =====
# Retention period in days - recordings older than this will be deleted
app.recording.retention-days=${RECORDING_RETENTION_DAYS:7}
# Enable/disable automatic cleanup
app.recording.cleanup.enabled=${RECORDING_CLEANUP_ENABLED:true}
# Cleanup schedule (cron expression) - default: 2 AM daily
app.recording.cleanup.cron=${RECORDING_CLEANUP_CRON:0 0 2 * * ?}

# ===== SECURITY =====
# NEVER use default in production - always override with env var JWT_SECRET
app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_ENV_VAR}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Data seeding control - disable in production
app.seed.enabled=${SEED_ENABLED:true}
app.seed.log-credentials=${SEED_LOG_CREDENTIALS:true}

# ===== ACTUATOR / OBSERVABILITY =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== STATIC RESOURCES — no browser caching in dev =====
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# ===== WHATSAPP NOTIFICATIONS =====
# Public URL of this app, used to build clickable recording links inside WhatsApp messages.
# Override to your real domain in production, e.g. https://mtng.yourdomain.com
app.public-url=${APP_PUBLIC_URL:http://localhost:8080}

# ===== Twilio WhatsApp — single centralised gateway =====
#
# Set these THREE environment variables ONCE on the Render dashboard and
# every teacher's notifications start working immediately, without any
# per-teacher activation flow:
#
#   TWILIO_ACCOUNT_SID    e.g. ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#   TWILIO_AUTH_TOKEN     e.g. your-32-char-token
#   TWILIO_WHATSAPP_FROM  e.g. +14155238886  (sandbox) OR your approved sender
#
# Why centralised:
#   • Zero per-teacher setup — teachers just type their number and toggle on.
#   • Single point of control — you configure credentials once.
#   • Real-time delivery receipts (Sent → Delivered → Read) surfaced in the
#     dashboard's "Recent Notifications" panel via the status-callback webhook.
#
# When all three are set the service uses Twilio for every teacher. When any
# of them is blank the dashboard shows a "service unavailable" banner and
# teachers can optionally use the self-serve CallMeBot fallback.
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}

# Twilio status-callback webhook URL — Twilio POSTs delivery receipts here.
# Leave blank to auto-derive from app.public-url (recommended in production).
# In local dev, leave blank — Twilio refuses to call http://localhost.
app.twilio.status-callback-url=${TWILIO_STATUS_CALLBACK_URL:}

# Verify the X-Twilio-Signature header on every callback. Set to false ONLY
# in development if you're testing callbacks via a tunnel that doesn't
# preserve the original Host header.
app.twilio.verify-signature=${TWILIO_VERIFY_SIGNATURE:true}

# Master kill-switch — set to false to disable all WhatsApp notifications without touching credentials
app.whatsapp.enabled=${WHATSAPP_ENABLED:true}

# ===== EXTERNAL NOTIFICATION SERVICE (Node.js on Render) =====
# Enables server-to-server call from Spring Boot to /notify endpoint.
app.notification.external.enabled=${NOTIFICATION_EXTERNAL_ENABLED:false}
app.notification.external.url=${NOTIFICATION_EXTERNAL_URL:}
app.notification.external.token=${NOTIFICATION_EXTERNAL_TOKEN:}
app.notification.external.max-attempts=${NOTIFICATION_EXTERNAL_MAX_ATTEMPTS:3}
app.notification.external.retry-delay-ms=${NOTIFICATION_EXTERNAL_RETRY_DELAY_MS:2000}

# ===== LOGGING =====
logging.level.com.host.studen=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
