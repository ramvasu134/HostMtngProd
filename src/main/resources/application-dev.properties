# ===== DEV Profile ? H2 in PostgreSQL Compatibility Mode =====
# Runs INSTANTLY. No database installation needed.
# H2 emulates PostgreSQL SQL syntax ? your queries are PgSQL-compatible.
# Data persists in ./data/meeting_db between restarts.

spring.datasource.url=jdbc:h2:file:./data/meeting_db;MODE=PostgreSQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Flyway disabled in dev (use Hibernate auto-ddl)
spring.flyway.enabled=false

# Data seeding enabled in dev
app.seed.enabled=true
app.seed.log-credentials=true

# WebSocket - allow all origins in dev for local testing
app.websocket.allowed-origins=*

# Dev JWT secret (not for production!)
app.jwt.secret=DEV_ONLY_SECRET_DO_NOT_USE_IN_PRODUCTION_12345

# Keep local session stable while testing UI flows (prevents auto logout on classpath changes)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

