# ===== Embedded PostgreSQL Profile =====
# A real PostgreSQL engine runs INSIDE the application.
# No external install needed ? it downloads the binary automatically.
#
# Data persists in ./data/pg-data between restarts.

# The DataSource is provided by EmbeddedPostgresConfig.java,
# so we only set JPA/Hibernate props here.

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable H2 console
spring.h2.console.enabled=false

# Logging
logging.level.io.zonky.test=INFO

