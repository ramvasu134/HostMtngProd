<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="98" fill="#FFD580" stroke="#FFB84D" stroke-width="2"/>

  <!-- Head -->
  <circle cx="100" cy="70" r="28" fill="#D4A574"/>

  <!-- Hair (Tom Cruise style - dark brown) -->
  <path d="M 72 45 Q 72 28 100 26 Q 128 28 128 48 L 128 65 Q 100 72 72 65 Z" fill="#3D2817"/>

  <!-- Hair highlights -->
  <path d="M 85 35 Q 90 32 95 35" stroke="#5C3D2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 35 Q 110 32 115 35" stroke="#5C3D2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Face features -->
  <!-- Eyes (Tom Cruise style - intense blue eyes) -->
  <circle cx="90" cy="65" r="3.5" fill="#003D7A"/>
  <circle cx="110" cy="65" r="3.5" fill="#003D7A"/>
  <circle cx="91" cy="64" r="1.8" fill="white"/>
  <circle cx="111" cy="64" r="1.8" fill="white"/>

  <!-- Eyebrows (intense) -->
  <path d="M 84 60 Q 90 57 96 59" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 104 59 Q 110 57 116 60" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose (distinctive) -->
  <line x1="100" y1="65" x2="100" y2="75" stroke="#C4956F" stroke-width="1.5"/>
  <path d="M 98 74 Q 100 76 102 74" fill="#B8845F" stroke="none"/>

  <!-- Mouth - charming smile -->
  <path d="M 88 81 Q 100 87 112 81" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Chin definition -->
  <path d="M 85 88 Q 100 91 115 88" stroke="#C4956F" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="92" y="95" width="16" height="8" fill="#D4A574"/>

  <!-- Chest/Shirt (Professional) -->
  <ellipse cx="100" cy="130" rx="40" ry="32" fill="#2C3E50"/>

  <!-- Shirt collar -->
  <path d="M 75 110 L 70 125 Q 100 135 130 125 L 125 110" fill="#34495E" stroke="#2C3E50" stroke-width="1.5"/>

  <!-- White shirt detail -->
  <path d="M 92 115 L 92 140 M 108 115 L 108 140" stroke="#ECF0F1" stroke-width="1" opacity="0.6"/>

  <!-- Tie (stylish red) -->
  <path d="M 100 110 L 95 130 L 100 135 L 105 130 Z" fill="#E74C3C"/>

  <!-- Shoulders -->
  <ellipse cx="65" cy="115" rx="12" ry="14" fill="#2C3E50" stroke="#34495E" stroke-width="1"/>
  <ellipse cx="135" cy="115" rx="12" ry="14" fill="#2C3E50" stroke="#34495E" stroke-width="1"/>

  <!-- Arms (visible) -->
  <!-- Left arm -->
  <rect x="40" y="118" width="18" height="45" rx="9" fill="#D4A574"/>
  <!-- Left hand -->
  <circle cx="49" cy="165" r="8" fill="#D4A574"/>

  <!-- Right arm -->
  <rect x="142" y="118" width="18" height="45" rx="9" fill="#D4A574"/>
  <!-- Right hand -->
  <circle cx="151" cy="165" r="8" fill="#D4A574"/>

  <!-- Hollywood star badge -->
  <g transform="translate(150, 45)">
    <!-- Star shape -->
    <path d="M 0 -8 L 2.4 -2.4 L 8 -2.4 L 3.2 1.6 L 5.6 7.2 L 0 3.2 L -5.6 7.2 L -3.2 1.6 L -8 -2.4 L -2.4 -2.4 Z"
          fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
  </g>

  <!-- Professional aura -->
  <circle cx="100" cy="100" r="105" fill="none" stroke="#2C3E50" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>

  <!-- Name badge at bottom -->
  <rect x="70" y="175" width="60" height="20" rx="10" fill="#3D5A80" stroke="#2C3E50" stroke-width="1.5"/>
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#ECF0F1">TOM CRUISE</text>
</svg>

