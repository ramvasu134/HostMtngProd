<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="98" fill="#FFD580" stroke="#FFB84D" stroke-width="2"/>

  <!-- Head -->
  <circle cx="100" cy="70" r="28" fill="#D4A574"/>

  <!-- Hair (He-Man style blonde) -->
  <path d="M 72 50 Q 72 30 100 28 Q 128 30 128 50 L 128 65 Q 100 72 72 65 Z" fill="#FFD700"/>

  <!-- Hair detail - sides -->
  <path d="M 68 45 Q 65 35 70 32" stroke="#FFC700" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 132 45 Q 135 35 130 32" stroke="#FFC700" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Face features -->
  <!-- Eyes -->
  <circle cx="90" cy="65" r="3" fill="#003366"/>
  <circle cx="110" cy="65" r="3" fill="#003366"/>
  <circle cx="91" cy="64" r="1.5" fill="white"/>
  <circle cx="111" cy="64" r="1.5" fill="white"/>

  <!-- Eyebrows (strong) -->
  <path d="M 85 60 Q 90 58 95 60" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 105 60 Q 110 58 115 60" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <line x1="100" y1="65" x2="100" y2="75" stroke="#C4956F" stroke-width="1.5"/>

  <!-- Mouth - confident smile -->
  <path d="M 90 80 Q 100 85 110 80" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Chin definition -->
  <path d="M 85 88 Q 100 92 115 88" stroke="#C4956F" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="92" y="95" width="16" height="8" fill="#D4A574"/>

  <!-- Powerful Muscular Body -->
  <!-- Chest/Armor (He-Man style) -->
  <ellipse cx="100" cy="125" rx="35" ry="28" fill="#FF6B35"/>

  <!-- Chest plate design -->
  <path d="M 75 120 L 75 140 Q 100 145 125 140 L 125 120" fill="#FF8C42" stroke="#DD4E2D" stroke-width="1.5"/>

  <!-- Shoulder armor -->
  <circle cx="65" cy="115" r="12" fill="#FF6B35" stroke="#DD4E2D" stroke-width="1"/>
  <circle cx="135" cy="115" r="12" fill="#FF6B35" stroke="#DD4E2D" stroke-width="1"/>

  <!-- Armor studs -->
  <circle cx="85" cy="125" r="3" fill="#FFD700"/>
  <circle cx="100" cy="125" r="3" fill="#FFD700"/>
  <circle cx="115" cy="125" r="3" fill="#FFD700"/>
  <circle cx="85" cy="138" r="3" fill="#FFD700"/>
  <circle cx="100" cy="138" r="3" fill="#FFD700"/>
  <circle cx="115" cy="138" r="3" fill="#FFD700"/>

  <!-- Power symbol (lightning bolt) on chest -->
  <path d="M 98 115 L 102 125 L 100 128 L 105 140 L 95 130 L 97 127 Z" fill="#FFD700"/>

  <!-- Arms -->
  <!-- Left arm -->
  <rect x="42" y="110" width="18" height="45" rx="9" fill="#D4A574"/>
  <!-- Left bicep definition -->
  <ellipse cx="51" cy="120" rx="12" ry="8" fill="#C4956F"/>
  <!-- Left forearm -->
  <rect x="40" y="140" width="16" height="35" rx="8" fill="#C4956F"/>
  <!-- Left hand -->
  <circle cx="48" cy="178" r="8" fill="#D4A574"/>

  <!-- Right arm -->
  <rect x="140" y="110" width="18" height="45" rx="9" fill="#D4A574"/>
  <!-- Right bicep definition -->
  <ellipse cx="149" cy="120" rx="12" ry="8" fill="#C4956F"/>
  <!-- Right forearm -->
  <rect x="144" y="140" width="16" height="35" rx="8" fill="#C4956F"/>
  <!-- Right hand -->
  <circle cx="152" cy="178" r="8" fill="#D4A574"/>

  <!-- Legs (visible) -->
  <!-- Left leg -->
  <rect x="80" y="148" width="14" height="40" rx="7" fill="#D4A574"/>
  <!-- Left foot -->
  <ellipse cx="87" cy="192" rx="8" ry="6" fill="#8B4513"/>

  <!-- Right leg -->
  <rect x="106" y="148" width="14" height="40" rx="7" fill="#D4A574"/>
  <!-- Right foot -->
  <ellipse cx="113" cy="192" rx="8" ry="6" fill="#8B4513"/>

  <!-- Power aura effect -->
  <circle cx="100" cy="100" r="105" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- "Hero" badge at bottom -->
  <rect x="75" y="175" width="50" height="20" rx="10" fill="#FFB84D" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3E2723">HERO</text>
</svg>

