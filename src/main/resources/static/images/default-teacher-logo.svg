<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1e293b"/>

  <!-- Gradient ring -->
  <defs>
    <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="25%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#22c55e"/>
      <stop offset="75%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#rainbowGradient)" stroke-width="5"/>

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="#0f172a"/>

  <!-- AiR Text -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#f97316">A</text>
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="transparent">A</text>
  <text x="115" y="90" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#3b82f6">i</text>
  <text x="130" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#22c55e">R</text>

  <!-- Feather icon approximation -->
  <path d="M100 105 Q90 130 100 145 Q110 130 100 105" fill="#38bdf8" opacity="0.8"/>
  <line x1="100" y1="105" x2="100" y2="150" stroke="#38bdf8" stroke-width="2"/>

  <!-- Voices subtitle -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#94a3b8">Voices</text>
</svg>

