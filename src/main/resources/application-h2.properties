# ===== H2 Profile (local dev fallback) =====
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=h2

spring.datasource.url=jdbc:h2:mem:meetingdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS PUBLIC
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable template caching for development
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

