# ============================================================
# GitHub Actions CI/CD Pipeline for Host Student Meeting
# 
# Triggers on:
# - Push to main/develop branches
# - Pull requests to main
# 
# Jobs:
# 1. Build & Test - Compile, run tests, check for vulnerabilities
# 2. Security Scan - CodeQL analysis for security issues
# 3. Docker Build - Build and optionally push container image
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggers

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ============================================================
  # Build and Test Job
  # ============================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      - name: Build with Maven
        run: ./mvnw clean compile -B
        
      - name: Run tests
        run: ./mvnw test -B
        env:
          SPRING_PROFILES_ACTIVE: test
          
      - name: Package JAR
        run: ./mvnw package -DskipTests -B
        
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ============================================================
  # Security Scanning Job
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          
      - name: Build for analysis
        run: ./mvnw compile -DskipTests -B
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        
      - name: Check for vulnerable dependencies
        run: ./mvnw dependency:tree -B | grep -i "vulnerability" || true

  # ============================================================
  # Docker Build Job
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # Set to true and add registry credentials for auto-deploy
          tags: |
            host-student-meeting:${{ github.sha }}
            host-student-meeting:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: host-student-meeting:${{ github.sha }}
          format: 'table'
          exit-code: '0'  # Set to '1' to fail on vulnerabilities
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ============================================================
  # Deployment Notification (optional)
  # ============================================================
  notify:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [docker]
    if: success()
    
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker image built successfully." >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: \`host-student-meeting:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready for deployment to Render.com or other platforms." >> $GITHUB_STEP_SUMMARY

