# ============================================================
#  Render.com Blueprint  –  Host Student Meeting (WebRTC App)
#  Deploy with: https://dashboard.render.com/select-repo
#  Docs: https://render.com/docs/blueprint-spec
#
#  PRODUCTION NOTES:
#  - For 1000+ users, upgrade to 'standard' plans (always-on, no cold starts)
#  - Enable persistent disk for recordings or migrate to S3/Cloudinary
#  - Consider Redis add-on for WebSocket session scaling
# ============================================================

databases:
  - name: meeting-db
    databaseName: meeting_db
    user: meeting_user
    # Render PostgreSQL plans (use hyphens):
    # free | basic-256mb | basic-1gb | basic-4gb |
    # pro-4gb | pro-8gb | pro-16gb | pro-32gb | pro-64gb | pro-128gb |
    # pro-192gb | pro-256gb | pro-384gb | pro-512gb
    plan: pro-4gb
    region: oregon
    # Enable point-in-time recovery for production
    # ipAllowList: []  # Restrict to known IPs in production

services:
  - type: web
    name: host-student-meeting
    runtime: docker
    # PRODUCTION: Use 'starter' or 'standard' for always-on (no spin-down)
    # Free tier spins down after 15 mins of inactivity
    plan: starter  # Upgrade from 'free' for production use
    region: oregon
    branch: main
    healthCheckPath: /actuator/health
    
    # ── Scaling (requires paid plan) ──────────────────────────────────────────
    # numInstances: 2  # Minimum 2 for high availability
    # autoscaling:
    #   min: 2
    #   max: 5
    #   criteria:
    #     cpu:
    #       enabled: true
    #       percentage: 70

    # ── Build & Deploy settings ──────────────────────────────────────────────
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # ── Auto-deploy on push ──────────────────────────────────────────────────
    autoDeploy: true

    # ── Environment Variables ────────────────────────────────────────────────
    envVars:

      # Spring profile → use prod properties
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: APP_PUBLIC_URL
        sync: false

      # ── Database (injected from the Render PostgreSQL above) ─────────────
      - key: DB_HOST
        fromDatabase:
          name: meeting-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: meeting-db
          property: port

      - key: DB_NAME
        fromDatabase:
          name: meeting-db
          property: database

      - key: DB_USER
        fromDatabase:
          name: meeting-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: meeting-db
          property: password

      # ── Database Pool Size ─────────────────────────────────────────────────
      - key: DB_POOL_SIZE
        value: "10"

      # ── Security ─────────────────────────────────────────────────────────
      # MANDATORY: Strong random JWT secret (auto-generated by Render)
      - key: JWT_SECRET
        generateValue: true

      # Teacher-independent mode:
      # - WHATSAPP_ENABLED=true allows each teacher to use their own number + API key
      # - External microservice is optional (off by default)
      - key: WHATSAPP_ENABLED
        value: "true"
      - key: NOTIFICATION_EXTERNAL_ENABLED
        value: "false"
      # Public HTTPS endpoint of notification-service, e.g. https://notification-service.onrender.com/notify
      - key: NOTIFICATION_EXTERNAL_URL
        sync: false
      # Must match notification-service NOTIFICATION_INTERNAL_TOKEN
      - key: NOTIFICATION_EXTERNAL_TOKEN
        sync: false
      - key: NOTIFICATION_EXTERNAL_MAX_ATTEMPTS
        value: "3"
      - key: NOTIFICATION_EXTERNAL_RETRY_DELAY_MS
        value: "2000"

      # ── Data Seeding (enable once to create superadmin + demo users) ───────
      # After first successful login, set to "false" and redeploy for security
      - key: SEED_ENABLED
        value: "true"

      # ── WebSocket CORS Origins ─────────────────────────────────────────────
      # Set to your actual domain(s) in production
      - key: APP_WEBSOCKET_ALLOWED_ORIGINS
        value: "https://*.onrender.com,https://your-domain.com"

      # ── JVM tuning (starter plan = 512MB-1GB RAM) ──────────────────────────
      - key: JAVA_OPTS
        value: "-server -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Xlog:gc*:stdout:time"

      # ── Disk paths (ephemeral - consider S3 for production) ────────────────
      - key: APP_UPLOAD_DIR
        value: /app/uploads
      - key: APP_RECORDING_DIR
        value: /app/recordings
      - key: APP_PROFILE_PHOTOS_DIR
        value: /app/profile-photos

    # ── Persistent Disk (optional, requires paid plan) ────────────────────────
    # disk:
    #   name: meeting-storage
    #   mountPath: /app/data
    #   sizeGB: 10

  - type: web
    name: notification-service
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: notification-service
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_PHONE_NUMBER
        sync: false
      - key: NOTIFICATION_MAX_RETRIES
        value: "3"
      - key: NOTIFICATION_RETRY_DELAY_MS
        value: "2000"
      - key: NOTIFICATION_INTERNAL_TOKEN
        generateValue: true

