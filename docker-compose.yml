version: '3.8'

services:
  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:16-alpine
    container_name: meeting-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: host_student_meeting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== pgAdmin (Optional - DB GUI) =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: meeting-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meeting.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres

  # ===== Node Notification Service =====
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: meeting-notification-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_PHONE_NUMBER: ${TWILIO_WHATSAPP_PHONE_NUMBER:-}
      NOTIFICATION_MAX_RETRIES: ${NOTIFICATION_MAX_RETRIES:-3}
      NOTIFICATION_RETRY_DELAY_MS: ${NOTIFICATION_RETRY_DELAY_MS:-2000}
      NOTIFICATION_INTERNAL_TOKEN: ${NOTIFICATION_INTERNAL_TOKEN:-}

volumes:
  pgdata:
    driver: local

